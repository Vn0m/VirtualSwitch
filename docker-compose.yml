x-peer: &peer
  platform: linux/amd64
  build:
    context: .
    dockerfile: Dockerfile.dev
  cap_add:
    - NET_ADMIN
    - NET_RAW
  devices:
    - /dev/net/tun:/dev/net/tun
  network_mode: host
  environment:
    - DISPLAY=${DISPLAY:-host.orbstack.internal:0}
  volumes:
    - .:/workspace
    - ${HOME}/terraria:/terraria:ro
    - terraria_saves:/root/.local/share/Terraria
  tty: true
  stdin_open: true

services:
  peer1:
    <<: *peer

  peer2:
    <<: *peer

volumes:
  terraria_saves:
